schema_version: 1

defaults:
  link_name: hull_link
  fluid_density: 1000.0
  water_level: 0.0
  gravity: 9.81
  cells: [14, 8, 4]
  cd: [0.9, 1.3, 2.0]
  current_velocity: [0.0, 0.0, 0.0]

  drag:
    # Total body-level linear damping targets [X, Y, Z] in N/(m/s).
    # The plugin divides by cell count when scale_by_cell_count=true.
    linear_total: [18.0, 55.0, 80.0]
    scale_by_cell_count: true

  hydrostatic_stiffness:
    enabled: false
    scale: 0.3
    heave_step: 0.01
    angle_step: 0.001

profiles:
  baseline: {}

  low_damping:
    drag:
      linear_total: [6.0, 18.0, 25.0]

  high_damping:
    drag:
      linear_total: [30.0, 90.0, 130.0]

  stiffness_on:
    hydrostatic_stiffness:
      enabled: true
      scale: 0.5

  ab_baseline:
    hydrostatic_stiffness:
      enabled: false
      scale: 0.0

  ab_stiffness:
    hydrostatic_stiffness:
      enabled: true
      scale: 0.5
